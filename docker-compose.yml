services:
  app:
    build:
      context: .
      network: host
    network_mode: host
    environment:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_DATABASE: saga
      DATABASE_USER: saga
      DATABASE_PASSWORD: saga
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: saga
      PGUSER: saga
      PGPASSWORD: saga
      REDIS_URL: redis://localhost:6379
      RUNTIME_ENABLED: "true"
      METRICS_ENABLED: "true"
      TELEMETRY_ENABLED: "false"
      PORT: "9080"
      RUNTIME_CALLBACK_BASEURL: "http://127.0.0.1:9080"
      RUNTIME_CALLBACK_HMACSECRET: "demo-secret"
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: saga
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bff:
    build:
      context: .
      dockerfile: ui/bff/Dockerfile
    network_mode: host
    environment:
      ORCHESTRATOR_URL: "http://localhost:9080"
    depends_on:
      - app

volumes:
  db_data:
